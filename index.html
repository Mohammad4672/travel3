<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة لرُبى ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma, Arial, sans-serif;
    background:linear-gradient(
        180deg,
        #ffd6a5 0%,
        #ffb4a2 35%,
        #e5989b 70%,
        #b5838d 100%
    );
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
}

.container{
    z-index:2;
    padding:20px;
}

h1{
    font-size:45px;
    margin-bottom:15px;
    text-shadow:0 3px 15px rgba(255,255,255,0.25);
}

p{
    font-size:20px;
    margin-bottom:30px;
    text-shadow:0 3px 15px rgba(255,255,255,0.2);
}

button{
    border:none;
    padding:18px 35px;
    font-size:20px;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:#222;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#finalText{
    display:none;
    margin-top:30px;
    font-size:28px;
    text-shadow:0 3px 15px rgba(255,255,255,0.25);
    animation:fadeIn 3s;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* قلوب */
.heart{
    position:absolute;
    bottom:-50px;
    font-size:25px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(-110vh); opacity:0;}
}

</style>
</head>

<body>

<div class="container">
    <h1>رُبى ❤️</h1>

    <p>إذا بدك تسمعي آخر شي بدي قوله...</p>

    <button onclick="playMessage()">🎙️ اسمعي الرسالة</button>

    <div id="finalText">
        ديري بالك عحالك يا رُبى ❤️<br><br>
      شكراً لأنك كنتِ جزء من قصتي.
      وكنتِ احلى شي بحياتي 
      ورح تضلي احلى شي 🤍
والحياة بدنك صدقيني ما بتسوى شي
    </div>
</div>

<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="voice" preload="auto">
    <source src="voice.mp3" type="audio/mpeg">
</audio>

<script>

/* 🎧 Fade function */
function fadeAudio(audio, type, duration){

    let step = 0.05;
    let interval = duration / (1 / step);

    if(type === "in"){
        audio.volume = 0;
        audio.play();

        let fade = setInterval(()=>{
            if(audio.volume < 1){
                audio.volume = Math.min(audio.volume + step, 1);
            } else {
                clearInterval(fade);
            }
        }, interval);
    }

    if(type === "out"){

        let fade = setInterval(()=>{
            if(audio.volume > 0){
                audio.volume = Math.max(audio.volume - step, 0);
            } else {
                audio.pause();
                clearInterval(fade);
            }
        }, interval);
    }
}

function playMessage(){

    const music = document.getElementById("music");
    const voice = document.getElementById("voice");

    // 🎵 موسيقى تدخل تدريجي
    music.loop = true;
    fadeAudio(music, "in", 3000);

    // 🎙️ صوتك بعد لحظة
    setTimeout(()=>{

        voice.volume = 0;
        voice.play();

        // fade in للصوت
        let v = 0;
        let fadeV = setInterval(()=>{
            if(v < 1){
                v += 0.1;
                voice.volume = v;
            } else {
                clearInterval(fadeV);
            }
        },80);

    },1200);

    document.querySelector("button").style.display="none";
}

/* 🎬 نهاية الصوت */
voice.onended = function(){

    setTimeout(()=>{

        fadeAudio(document.getElementById("music"), "out", 4000);

        setTimeout(()=>{
            document.getElementById("finalText").style.display="block";
        },2500);

    },1000);
};

/* 💖 قلوب */
function createHeart(){

    const heart = document.createElement("div");
    heart.classList.add("heart");

    const hearts = ["❤️","💖","💗","🤍","💛"];

    heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*30) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
